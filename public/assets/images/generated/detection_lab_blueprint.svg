<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
      <defs>
        <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0, 240, 255, 0.2)" stroke-width="0.5"/>
        </pattern>
        <pattern id="largeGrid" width="100" height="100" patternUnits="userSpaceOnUse">
          <rect width="100" height="100" fill="url(#smallGrid)"/>
          <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(0, 240, 255, 0.5)" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="#020408" />
      <rect width="100%" height="100%" fill="url(#largeGrid)" />
      <circle cx="400" cy="400" r="300" fill="none" stroke="rgba(0, 240, 255, 0.3)" stroke-width="2" stroke-dasharray="10 5"/>
    </svg>