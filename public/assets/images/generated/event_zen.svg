<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
      
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 240, 255, 0.15)" stroke-width="1"/>
      <circle cx="40" cy="40" r="1.5" fill="rgba(0, 240, 255, 0.4)"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#040914" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="cyberLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#040914" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  <rect width="100%" height="100%" fill="url(#glow)" />

      <rect x="150" y="50" width="300" height="100" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f7" stroke-width="2" filter="url(#neonGlow)"/>
      <text x="300" y="115" font-family="sans-serif" font-size="32" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="10" filter="url(#neonGlow)">ZEN MASTERY</text>
    </svg>