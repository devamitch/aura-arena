<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="AURA ARENA" />
    <meta name="theme-color" content="#040610" />
    <meta
      name="description"
      content="AI-powered movement performance scoring — boxing, dance, martial arts & more"
    />

    <!-- Open Graph -->
    <meta property="og:title" content="AURA ARENA" />
    <meta
      property="og:description"
      content="Score your movement with real-time AI"
    />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts: preconnect for speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <title>AURA ARENA</title>
  </head>
  <body>
    <script>
      // VISUAL ERROR CATCHER FOR DIAGNOSIS
      window.addEventListener("error", function (e) {
        document.body.innerHTML +=
          '<div style="color:red; background:black; border:2px solid red; padding: 20px; font-size: 16px; font-family: monospace; position:absolute; top:0; left:0; z-index:99999; width: 100vw; height: 100vh;"><h3>FATAL JS ERROR</h3><br>Message: ' +
          e.message +
          "<br>File: " +
          e.filename +
          ":" +
          e.lineno +
          ":<br><pre>" +
          (e.error ? e.error.stack : "") +
          "</pre></div>";
      });
      window.addEventListener("unhandledrejection", function (e) {
        document.body.innerHTML +=
          '<div style="color:yellow; background:black; border:2px solid yellow; padding: 20px; font-size: 16px; font-family: monospace; position:absolute; top:0; left:0; z-index:99999; width: 100vw; height: 100vh;"><h3>UNHANDLED PROMISE REJECTION</h3><br>Reason: ' +
          (e.reason ? e.reason.stack || e.reason : "Unknown") +
          "</div>";
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
